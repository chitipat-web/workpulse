<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#f0f0f0;">

<h2>🔥 Firebase Test</h2>
<div id="status" style="padding:16px;background:#fff;border-radius:12px;margin:10px 0;font-size:16px;">
  กำลังโหลด Firebase...
</div>
<button onclick="testLogin()" style="padding:14px 28px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;margin-top:10px;">
  ทดสอบ Login
</button>
<div id="log" style="margin-top:16px;font-size:13px;color:#666;"></div>

<script src="https://unpkg.com/firebase@9.23.0/compat/app.js"></script>

<script src="https://unpkg.com/firebase@9.23.0/compat/firestore.js"></script>

<script>
var log = document.getElementById('log');
var status = document.getElementById('status');

function addLog(msg) {
  log.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + msg + '</div>';
}

var FB_CONFIG = {
  apiKey: "AIzaSyCh7phsliIRMPScGcoS4eGBDkohSOrKdIg",
  authDomain: "workpulse-1c177.firebaseapp.com",
  projectId: "workpulse-1c177"
};

var db = null;

window.onload = function() {
  addLog('window.onload fired');
  try {
    if (typeof firebase === 'undefined') {
      status.style.background = '#ffeeee';
      status.innerHTML = '❌ Firebase SDK ไม่ได้โหลด!';
      addLog('firebase variable NOT found');
    } else {
      addLog('firebase found ✅');
      if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
      db = firebase.firestore();
      status.style.background = '#eeffee';
      status.innerHTML = '✅ Firebase โหลดสำเร็จ! กดปุ่มทดสอบได้เลย';
      addLog('Firebase init success ✅');
    }
  } catch(e) {
    status.style.background = '#ffeeee';
    status.innerHTML = '❌ Error: ' + e.message;
    addLog('Error: ' + e.message);
  }
};

function testLogin() {
  addLog('Testing login...');
  if (!db) {
    alert('Firebase ยังไม่พร้อม');
    return;
  }
  db.collection('test').doc('test').set({t: new Date().toISOString()})
    .then(function() {
      status.innerHTML = '🎉 Login + Firebase ทำงานได้ปกติ!';
      status.style.background = '#eeffee';
      addLog('Write to Firestore ✅');
    })
    .catch(function(e) {
      addLog('Firestore error: ' + e.message);
      status.innerHTML = '⚠️ Firebase ต่อได้แต่ write error: ' + e.message;
    });
}
</script>

</body>
</html>
